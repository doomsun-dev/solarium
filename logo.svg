<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 45 292 390" width="292" height="390">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="c" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Arching window frame — three nested pointed arches -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer arch -->
    <path d="M128 420 L128 220 Q128 80 256 60 Q384 80 384 220 L384 420"
          stroke="url(#b)" stroke-width="14" opacity="0.5"/>
    <!-- Middle arch -->
    <path d="M172 420 L172 230 Q172 120 256 100 Q340 120 340 230 L340 420"
          stroke="url(#a)" stroke-width="10" opacity="0.7"/>
    <!-- Inner arch -->
    <path d="M216 420 L216 240 Q216 160 256 148 Q296 160 296 240 L296 420"
          stroke="url(#c)" stroke-width="7" opacity="0.9"/>
  </g>

  <!-- Horizontal mullions — glass pane divisions -->
  <g stroke="url(#a)" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="135" y1="220" x2="377" y2="220"/>
    <line x1="148" y1="180" x2="364" y2="180"/>
    <line x1="175" y1="280" x2="337" y2="280"/>
    <line x1="175" y1="340" x2="337" y2="340"/>
    <line x1="175" y1="400" x2="337" y2="400"/>
  </g>

  <!-- Central vertical mullion -->
  <line x1="256" y1="60" x2="256" y2="420"
        stroke="url(#c)" stroke-width="3" opacity="0.4"/>

  <!-- Light rays streaming through the window -->
  <g opacity="0.25">
    <polygon points="216,148 180,420 200,420" fill="url(#c)"/>
    <polygon points="256,100 230,420 256,420" fill="url(#c)"/>
    <polygon points="296,148 332,420 312,420" fill="url(#c)"/>
  </g>

  <!-- Bright point at apex -->
  <circle cx="256" cy="72" r="14" fill="url(#c)" opacity="0.8"/>
  <circle cx="256" cy="72" r="7" fill="#FEF3C7"/>
</svg>
